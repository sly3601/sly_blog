name = "sly-skill-tree-api-pages"
pages_build_output_dir = "./dist"
compatibility_date = "2026-05-25"

[[kv_namespaces]]
binding = "SKILL_TREE_KV"
id = "05dd298085384c268dfb9407e7fce1e9"

[vars]
ALLOWED_ORIGINS = "https://sly3601.github.io,http://localhost:4002,http://localhost:4003"
# /write image uploads use a separate GitHub repo by default.
# Secret required: GITHUB_TOKEN
# Optional vars:
GITHUB_IMAGE_OWNER = "sly3601"
GITHUB_IMAGE_REPO = "sly_blog_images"
GITHUB_IMAGE_BRANCH = "main"
GITHUB_IMAGE_PREFIX = "blog"
GITHUB_IMAGE_AUTO_CREATE = "true"
# S.EE fallback can still be configured as a Cloudflare Pages secret:
# S_EE_API_KEY = "paste_in_dashboard_or_wrangler_secret"
# Configure these in Cloudflare Pages once COS is ready:
# TENCENT_COS_BUCKET = "sly-blog-1250000000"
# TENCENT_COS_REGION = "ap-guangzhou"
# TENCENT_COS_PUBLIC_BASE_URL = "https://img.example.com"
# TENCENT_COS_UPLOAD_PREFIX = "blog"
